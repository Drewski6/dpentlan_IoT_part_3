apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wil42-app
  namespace: dev
spec:
  rules:
  - host: wil42.127.0.0.1.sslip.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: wil42-app
            port:
              number: 80